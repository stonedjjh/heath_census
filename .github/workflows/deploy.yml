name: Deploy healthAnalysis to Pages

on:
  push:
    branches: ["main"] # Cambia a "master" si esa es tu rama principal

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/pages-languages-charts-action@v1 # Configuración base
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './healthAnalysis' # AQUÍ le decimos que use tu carpeta
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
